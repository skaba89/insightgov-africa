# =============================================================================
# InsightGov Africa - Configuration PostgreSQL Production
# =============================================================================
# Configuration optimisée pour PostgreSQL 16 en production
# Ajuster les valeurs selon les ressources disponibles
# =============================================================================

# =============================================================================
# CONNEXIONS
# =============================================================================

# Nombre maximum de connexions
# Ajuster selon le nombre d'instances de l'application
max_connections = 100

# Superuser reserved connections
superuser_reserved_connections = 3

# =============================================================================
# MÉMOIRE
# =============================================================================

# Shared buffers (25% de la RAM totale, max 8GB)
shared_buffers = 256MB

# Effective cache size (50-75% de la RAM totale)
effective_cache_size = 1GB

# Work memory (pour les opérations de tri et hash)
work_mem = 16MB

# Maintenance work memory (pour VACUUM, CREATE INDEX)
maintenance_work_mem = 256MB

# =============================================================================
# WAL (Write-Ahead Logging)
# =============================================================================

# WAL level pour la réplication (optionnel)
wal_level = replica

# Archivage WAL (pour les backups)
archive_mode = on
archive_command = 'cp %p /backups/wal/%f'

# Checkpoint settings
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 1GB
min_wal_size = 80MB

# =============================================================================
# PLANNING / OPTIMISATEUR
# =============================================================================

# Random page cost (SSD = 1.1, HDD = 4.0)
random_page_cost = 1.1

# Effective I/O concurrency (SSD = 200)
effective_io_concurrency = 200

# Default statistics target
default_statistics_target = 100

# =============================================================================
# LOGGING
# =============================================================================

# Log des connexions
log_connections = on
log_disconnections = on

# Log des durées longues
log_min_duration_statement = 1000

# Log format
log_line_prefix = '%t [%p] %u@%d '

# Log destination
log_destination = 'stderr'

# =============================================================================
# RÉPLICATION (optionnel)
# =============================================================================

# Max wal senders pour la réplication
max_wal_senders = 3

# Wal keep segments
wal_keep_size = 256MB

# =============================================================================
# SÉCURITÉ
# =============================================================================

# SSL (configurer les certificats séparément)
ssl = off
# ssl_cert_file = '/etc/ssl/certs/postgresql.crt'
# ssl_key_file = '/etc/ssl/private/postgresql.key'

# Password encryption
password_encryption = scram-sha-256

# =============================================================================
# LOCALES
# =============================================================================

# Timezone
timezone = 'Africa/Conakry'

# LC settings
lc_messages = 'en_US.UTF-8'
lc_monetary = 'fr_GN.UTF-8'
lc_numeric = 'fr_GN.UTF-8'
lc_time = 'fr_GN.UTF-8'
