# =============================================================================
# InsightGov Africa - Configuration Nginx Production
# =============================================================================
# Reverse proxy optimisé pour Next.js avec:
# - SSL/TLS configuration
# - Cache headers optimisés
# - Rate limiting
# - Gzip compression
# - Security headers
# - WebSocket support (pour Socket.io)
# =============================================================================

# Nombre de workers = nombre de CPU
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Events configuration
events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

# HTTP Configuration
http {
    # ==========================================================================
    # INCLUSIONS
    # ==========================================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ==========================================================================
    # LOGGING
    # ==========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ==========================================================================
    # OPTIMISATIONS
    # ==========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Buffer settings for proxy
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # ==========================================================================
    # GZIP COMPRESSION
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ==========================================================================
    # RATE LIMITING
    # ==========================================================================
    # Zone pour limiter les requêtes par IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=100r/s;

    # Zone pour limiter les connexions
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Status 429 personnalisé
    limit_req_status 429;
    limit_conn_status 429;

    # ==========================================================================
    # UPSTREAM - Application Next.js
    # ==========================================================================
    upstream nextjs_app {
        least_conn;
        server app:3000 weight=5;
        # Pour le scaling, ajouter d'autres instances:
        # server app-1:3000 weight=5;
        # server app-2:3000 weight=5;
        keepalive 32;
    }

    # ==========================================================================
    # CACHE ZONE - Fichiers statiques
    # ==========================================================================
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:100m
                     max_size=1g inactive=60m use_temp_path=off;

    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:50m
                     max_size=500m inactive=10m use_temp_path=off;

    # ==========================================================================
    # SERVER - HTTP (Redirection vers HTTPS)
    # ==========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Health check endpoint (sans redirection)
        location /api/health {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # Redirection HTTPS pour tout le reste
        location / {
            return 301 https://$host$request_uri;
        }

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }
    }

    # ==========================================================================
    # SERVER - HTTPS (Principal)
    # ==========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # ======================================================================
        # SSL/TLS CONFIGURATION
        # ======================================================================
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL optimisé (Mozilla Intermediate configuration)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # SSL session cache
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # HSTS (force HTTPS)
        add_header Strict-Transport-Security "max-age=63072000" always;

        # ======================================================================
        # SECURITY HEADERS
        # ======================================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.github.com https://api.paystack.co; frame-ancestors 'self';" always;

        # ======================================================================
        # ROOT ET INDEX
        # ======================================================================
        root /var/www/html;
        index index.html;

        # ======================================================================
        # WEBSOCKET (Socket.io)
        # ======================================================================
        location /socket.io/ {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # ======================================================================
        # API ROUTES
        # ======================================================================
        # API générales avec rate limiting modéré
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Cache court pour les API GET
            proxy_cache api_cache;
            proxy_cache_methods GET;
            proxy_cache_valid 200 5s;
            proxy_cache_key $scheme$request_method$host$request_uri;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ======================================================================
        # WEBHOOKS - Orange Money & MTN Money
        # ======================================================================
        # Rate limiting élevé pour les webhooks
        location ~ ^/api/webhooks/(orange|mtn)/?$ {
            limit_req zone=webhooks burst=200 nodelay;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Webhook-Source "nginx";

            # Vérification IP (optionnel - à adapter selon les IPs des providers)
            # allow 196.49.32.0/24;  # Orange Guinée
            # allow 196.49.33.0/24;  # MTN Guinée
            # deny all;
        }

        # ======================================================================
        # AUTH ROUTES - Rate limiting strict
        # ======================================================================
        location ~ ^/api/auth/(login|register|forgot-password)/?$ {
            limit_req zone=auth burst=5 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ======================================================================
        # HEALTH CHECK
        # ======================================================================
        location /api/health {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;

            # Cache désactivé pour health checks
            proxy_cache off;
            add_header X-Cache-Status "BYPASS";
        }

        # ======================================================================
        # STATIC FILES - Cache optimisé
        # ======================================================================
        # Next.js static files
        location /_next/static/ {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            # Cache long pour les fichiers statiques (1 an)
            proxy_cache static_cache;
            proxy_cache_valid 200 365d;
            proxy_cache_key $uri;
            proxy_ignore_headers Set-Cookie;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=31536000, immutable";

            expires 365d;
            access_log off;
        }

        # Images et assets
        location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            proxy_cache static_cache;
            proxy_cache_valid 200 30d;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=2592000";

            expires 30d;
            access_log off;
        }

        # ======================================================================
        # APPLICATION ROUTES
        # ======================================================================
        location / {
            limit_req zone=general burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ======================================================================
        # ERROR PAGES
        # ======================================================================
        error_page 429 /429.html;
        error_page 500 502 503 504 /50x.html;

        location = /429.html {
            root /var/www/html;
            internal;
        }

        location = /50x.html {
            root /var/www/html;
            internal;
        }
    }
}
