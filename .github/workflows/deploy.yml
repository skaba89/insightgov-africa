# ============================================
# InsightGov Africa - Production Deployment
# Deploy to Production Environment
# ============================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  BUN_VERSION: '1.3.4'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==========================================
  # Pre-deployment Checks
  # ==========================================
  pre-deploy:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deployment conditions
        id: check
        run: |
          echo "Checking deployment conditions..."
          # Skip deployment if commit message contains [skip deploy]
          if git log -1 --pretty=%B | grep -q "\[skip deploy\]"; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "::warning::Deployment skipped due to [skip deploy] tag"
          else
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Deployment conditions met"
          fi

  # ==========================================
  # Build Docker Image
  # ==========================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: needs.pre-deploy.outputs.should_deploy == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXTAUTH_URL }}
            NEXT_PUBLIC_APP_NAME=InsightGov Africa

      - name: Output image digest
        run: echo ${{ steps.meta.outputs.digest }}

  # ==========================================
  # Database Migrations
  # ==========================================
  migrate-database:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: [pre-deploy, build-docker]
    if: needs.pre-deploy.outputs.should_deploy == 'true'
    environment:
      name: production
      url: ${{ secrets.NEXTAUTH_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Run database migrations
        run: bunx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify database connection
        run: bunx prisma db execute --stdin <<EOF
          SELECT 1 as health_check;
        EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ==========================================
  # Deploy to Vercel
  # ==========================================
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [pre-deploy, build-docker, migrate-database]
    if: |
      needs.pre-deploy.outputs.should_deploy == 'true' &&
      vars.DEPLOY_TARGET == 'vercel'
    environment:
      name: production
      url: ${{ secrets.NEXTAUTH_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_ORG_ID }}

  # ==========================================
  # Deploy to Custom Server (SSH)
  # ==========================================
  deploy-custom:
    name: Deploy to Custom Server
    runs-on: ubuntu-latest
    needs: [pre-deploy, build-docker, migrate-database]
    if: |
      needs.pre-deploy.outputs.should_deploy == 'true' &&
      vars.DEPLOY_TARGET == 'custom'
    environment:
      name: production
      url: ${{ secrets.NEXTAUTH_URL }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            
            echo "============================================"
            echo "🚀 InsightGov Africa - Production Deployment"
            echo "============================================"
            
            # Navigate to app directory
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Pull latest changes
            git pull origin main
            
            # Pull latest Docker image
            docker compose pull
            
            # Run database migrations
            docker compose run --rm app bunx prisma migrate deploy
            
            # Restart services with zero downtime
            docker compose up -d --no-deps --build app
            
            # Health check
            echo "Waiting for application to start..."
            sleep 10
            
            # Verify deployment
            curl -f ${{ secrets.NEXTAUTH_URL }}/api/health || exit 1
            
            echo "✅ Deployment successful!"

  # ==========================================
  # Deploy to Render
  # ==========================================
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [pre-deploy, build-docker, migrate-database]
    if: |
      needs.pre-deploy.outputs.should_deploy == 'true' &&
      vars.DEPLOY_TARGET == 'render'
    environment:
      name: production
      url: ${{ secrets.NEXTAUTH_URL }}
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

  # ==========================================
  # Post-deployment Verification
  # ==========================================
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-custom, deploy-render]
    if: always() && (needs.deploy-vercel.result == 'success' || needs.deploy-custom.result == 'success' || needs.deploy-render.result == 'success')
    steps:
      - name: Health Check
        run: |
          echo "Running health check against ${{ secrets.NEXTAUTH_URL }}"
          
          # Wait for deployment to be ready
          sleep 30
          
          # Check health endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.NEXTAUTH_URL }}/api/health")
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Health check failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Health check passed!"

      - name: Run Smoke Tests
        run: |
          echo "Running smoke tests..."
          
          # Test main page
          curl -f "${{ secrets.NEXTAUTH_URL }}/" > /dev/null
          echo "✅ Main page accessible"
          
          # Test API health
          curl -f "${{ secrets.NEXTAUTH_URL }}/api/health" > /dev/null
          echo "✅ API health endpoint accessible"

  # ==========================================
  # Deployment Notification
  # ==========================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [verify-deployment]
    if: always()
    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.verify-deployment.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=Deployment successful" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Deployment failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ steps.status.outputs.status }}
          text: |
            ${{ steps.status.outputs.emoji }} InsightGov Africa - ${{ steps.status.outputs.message }}
            
            *Environment:* Production
            *Branch:* ${{ github.ref_name }}
            *Commit:* ${{ github.sha }}
            *Author:* ${{ github.actor }}
            *URL:* ${{ secrets.NEXTAUTH_URL }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Email Notification
        if: secrets.NOTIFICATION_EMAIL != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: |
            ${{ steps.status.outputs.emoji }} InsightGov Africa - ${{ steps.status.outputs.message }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: InsightGov CI/CD <noreply@insightgov.africa>
          body: |
            Deployment Status: ${{ steps.status.outputs.message }}
            
            Environment: Production
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            URL: ${{ secrets.NEXTAUTH_URL }}

  # ==========================================
  # Deployment Summary
  # ==========================================
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-docker, migrate-database, verify-deployment]
    if: success()
    steps:
      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "🎉 InsightGov Africa Deployed Successfully"
          echo "============================================"
          echo ""
          echo "Deployment Details:"
          echo "  📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  🌐 URL: ${{ secrets.NEXTAUTH_URL }}"
          echo "  🔗 Commit: ${{ github.sha }}"
          echo "  👤 Deployer: ${{ github.actor }}"
          echo ""
          echo "Production is live! 🚀"
