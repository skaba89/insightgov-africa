# ============================================
# InsightGov Africa - Security Scanning
# Automated Security Analysis
# ============================================

name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  BUN_VERSION: '1.3.4'

jobs:
  # ==========================================
  # Dependency Vulnerability Audit
  # ==========================================
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun audit
        id: bun-audit
        run: |
          echo "Running Bun security audit..."
          bun audit --json > audit-report.json 2>/dev/null || true
          
          # Count vulnerabilities
          HIGH=$(cat audit-report.json | jq '.advisories | map(select(.severity == "high")) | length' 2>/dev/null || echo "0")
          CRITICAL=$(cat audit-report.json | jq '.advisories | map(select(.severity == "critical")) | length' 2>/dev/null || echo "0")
          
          echo "high_vulns=$HIGH" >> $GITHUB_OUTPUT
          echo "critical_vulns=$CRITICAL" >> $GITHUB_OUTPUT
          
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities!"
            exit 1
          elif [ "$HIGH" -gt "0" ]; then
            echo "::warning::Found $HIGH high severity vulnerabilities"
          else
            echo "✅ No critical or high vulnerabilities found"
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit-report
          path: audit-report.json
          retention-days: 30

      - name: Check for outdated dependencies
        run: |
          echo "Checking for outdated dependencies..."
          bun outdated || true

  # ==========================================
  # CodeQL Analysis
  # ==========================================
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql-config.yml
        continue-on-error: true

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          output: sarif-results
        continue-on-error: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-results
        continue-on-error: true

  # ==========================================
  # Secret Scanning
  # ==========================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified --fail

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ==========================================
  # SAST - Semgrep
  # ==========================================
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/typescript
            p/react
            p/nextjs
          output-format: sarif
          output-file: semgrep-results.sarif
        continue-on-error: true

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true

  # ==========================================
  # Container Security Scan
  # ==========================================
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          docker build -t insightgov-africa:scan . \
            --build-arg NEXT_PUBLIC_APP_URL=http://localhost:3000 \
            --build-arg NEXT_PUBLIC_APP_NAME=InsightGov

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'insightgov-africa:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Run Trivy for summary
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'insightgov-africa:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

  # ==========================================
  # OWASP Dependency Check
  # ==========================================
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'InsightGov Africa'
          path: '.'
          format: 'HTML JSON'
          out: 'reports'
          args: >
            --suppression .github/dependency-check-suppressions.xml
            --failOnCVSS 7
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 30

  # ==========================================
  # License Compliance
  # ==========================================
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check licenses
        run: |
          echo "Checking package licenses..."
          
          # Create allowlist for compatible licenses
          ALLOWLIST="MIT|Apache-2.0|BSD-2-Clause|BSD-3-Clause|ISC|0BSD|Unlicense"
          
          # Get all licenses
          bun pm ls --json 2>/dev/null | jq -r '.[] | "\(.name): \(.license // "Unknown")"' > licenses.txt || true
          
          echo "Package licenses:"
          cat licenses.txt || echo "Could not determine licenses"

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.txt
          retention-days: 30

  # ==========================================
  # Security Summary
  # ==========================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, codeql-analysis, secret-scan, semgrep, container-scan]
    if: always()
    steps:
      - name: Security Scan Summary
        run: |
          echo "============================================"
          echo "🔒 InsightGov Africa - Security Scan Summary"
          echo "============================================"
          echo ""
          echo "Scan Results:"
          echo "  📦 Dependency Audit: ${{ needs.dependency-audit.result }}"
          echo "  🔍 CodeQL Analysis: ${{ needs.codeql-analysis.result }}"
          echo "  🔑 Secret Scanning: ${{ needs.secret-scan.result }}"
          echo "  🛡️ Semgrep SAST: ${{ needs.semgrep.result }}"
          echo "  🐳 Container Scan: ${{ needs.container-scan.result }}"
          echo ""
          
          # Check if any critical issues found
          if [[ "${{ needs.dependency-audit.result }}" == "failure" || \
                "${{ needs.secret-scan.result }}" == "failure" ]]; then
            echo "::error::Critical security issues detected!"
            exit 1
          fi
          
          echo "✅ Security scan completed"

      - name: Create Security Badge
        run: |
          if [[ "${{ needs.dependency-audit.result }}" == "failure" || \
                "${{ needs.secret-scan.result }}" == "failure" ]]; then
            echo "security_status=critical" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.codeql-analysis.result }}" == "failure" || \
                  "${{ needs.semgrep.result }}" == "failure" ]]; then
            echo "security_status=warning" >> $GITHUB_OUTPUT
          else
            echo "security_status=passing" >> $GITHUB_OUTPUT
          fi
