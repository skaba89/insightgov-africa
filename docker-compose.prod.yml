# =============================================================================
# InsightGov Africa - Docker Compose pour Production
# =============================================================================
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml down
#   docker-compose -f docker-compose.prod.yml logs -f
#
# Services inclus:
#   - PostgreSQL: Base de données avec backup automatique
#   - Redis: Cache persistant avec sauvegarde
#   - Nginx: Reverse proxy avec SSL/TLS
#   - App: Application Next.js (scalable)
#   - Backup: Service de sauvegarde automatique
#
# SÉCURITÉ: Tous les secrets doivent être définis dans .env.production
# =============================================================================

services:
  # ===========================================================================
  # POSTGRESQL - Base de données production
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: insightgov-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER requis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis}
      POSTGRES_DB: ${DB_NAME:-insightgov}
      # Configuration production PostgreSQL
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - postgres_backup:/backups
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-insightgov}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      insightgov-internal:
        aliases:
          - db
    # Resource limits production
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
      - /var/run/postgresql

  # ===========================================================================
  # REDIS - Cache production avec persistance
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: insightgov-redis-prod
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD requis}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      insightgov-internal:
        aliases:
          - redis
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    security_opt:
      - no-new-privileges:true

  # ===========================================================================
  # NEXT.JS APPLICATION - Production
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    image: insightgov-africa:${APP_VERSION:-latest}
    container_name: insightgov-app-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Base de données
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-insightgov}?schema=public&sslmode=disable

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # NextAuth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET requis}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL requis}

      # IA
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY requis}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}

      # Application
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-InsightGov Africa}
      NODE_ENV: production

      # Admin initial
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      # Paiements - Orange Money (Guinée)
      ORANGE_MONEY_API_KEY: ${ORANGE_MONEY_API_KEY:-}
      ORANGE_MONEY_API_SECRET: ${ORANGE_MONEY_API_SECRET:-}
      ORANGE_MONEY_MERCHANT_CODE: ${ORANGE_MONEY_MERCHANT_CODE:-}
      ORANGE_MONEY_WEBHOOK_SECRET: ${ORANGE_MONEY_WEBHOOK_SECRET:-}
      ORANGE_MONEY_ENVIRONMENT: ${ORANGE_MONEY_ENVIRONMENT:-production}

      # Paiements - MTN Money (Guinée)
      MTN_MONEY_API_KEY: ${MTN_MONEY_API_KEY:-}
      MTN_MONEY_API_SECRET: ${MTN_MONEY_API_SECRET:-}
      MTN_MONEY_MERCHANT_CODE: ${MTN_MONEY_MERCHANT_CODE:-}
      MTN_MONEY_WEBHOOK_SECRET: ${MTN_MONEY_WEBHOOK_SECRET:-}
      MTN_MONEY_ENVIRONMENT: ${MTN_MONEY_ENVIRONMENT:-production}

      # Paystack
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}

      # Email
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@insightgov.africa}

      # SMS
      AFRICAS_TALKING_API_KEY: ${AFRICAS_TALKING_API_KEY:-}
      AFRICAS_TALKING_USERNAME: ${AFRICAS_TALKING_USERNAME:-}

      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: production

    networks:
      insightgov-internal:
        aliases:
          - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      # Configuration scalable - peut être répliqué
      replicas: ${APP_REPLICAS:-1}
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 300s
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache

  # ===========================================================================
  # NGINX - Reverse Proxy avec SSL
  # ===========================================================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: insightgov-nginx:${APP_VERSION:-latest}
    container_name: insightgov-nginx-prod
    restart: always
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      # Certificats SSL Let's Encrypt (optionnel)
      - letsencrypt_data:/etc/letsencrypt:ro
    networks:
      insightgov-internal:
        aliases:
          - nginx
      insightgov-external:
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    security_opt:
      - no-new-privileges:true

  # ===========================================================================
  # BACKUP - Service de sauvegarde automatique
  # ===========================================================================
  backup:
    image: postgres:16-alpine
    container_name: insightgov-backup
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-insightgov}
      # Configuration S3 pour les backups
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-eu-west-3}
      S3_BUCKET: ${S3_BUCKET:-}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - postgres_backup:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    networks:
      - insightgov-internal
    deploy:
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 60s
        max_attempts: 3
    security_opt:
      - no-new-privileges:true

# =============================================================================
# RÉSEAUX - Isolation sécurisée
# =============================================================================
networks:
  # Réseau interne - seuls les services autorisés peuvent communiquer
  insightgov-internal:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.29.0.0/16

  # Réseau externe - pour l'accès public via Nginx
  insightgov-external:
    driver: bridge

# =============================================================================
# VOLUMES PERSISTANTS
# =============================================================================
volumes:
  postgres_prod_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/insightgov/postgres}

  postgres_backup:
    driver: local

  redis_prod_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${REDIS_DATA_PATH:-/var/lib/insightgov/redis}

  nginx_logs:
    driver: local

  letsencrypt_data:
    driver: local
